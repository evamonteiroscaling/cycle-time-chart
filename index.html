<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Time Swimlane</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f8; color: #1a1a1a; padding: 24px; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 16px; }
  .filters { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 11px; color: #aaa; }
  .filter-select { padding: 5px 10px; border-radius: 8px; font-size: 12px; border: 0.5px solid #ccc; cursor: pointer; background: white; color: #1a1a1a; outline: none; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .card { background: #f1f0eb; border-radius: 8px; padding: 12px 16px; }
  .card-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .card-value { font-size: 20px; font-weight: 500; }
  .card-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .chart-wrap { overflow-x: auto; }
  .chart { position: relative; min-width: 600px; background: white; border-radius: 8px; border: 0.5px solid #e0e0e0; padding: 8px 0; }
  .row { display: flex; align-items: center; height: 42px; position: relative; }
  .row:nth-child(even) { background: rgba(0,0,0,0.015); }
  .row-label { width: 190px; padding: 0 10px 0 12px; flex-shrink: 0; z-index: 2; }
  .row-label .name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-label .sub { font-size: 10px; color: #999; }
  .row-bars { flex: 1; position: relative; height: 42px; }
  .bar { position: absolute; top: 8px; height: 26px; border-radius: 3px; opacity: 0.9; cursor: default; z-index: 2; }
  .axis { display: flex; height: 32px; margin-top: 4px; }
  .axis-spacer { width: 190px; flex-shrink: 0; }
  .axis-labels { flex: 1; position: relative; }
  .axis-label { position: absolute; font-size: 10px; color: #aaa; transform: translateX(-50%) rotate(-30deg); transform-origin: top center; white-space: nowrap; top: 6px; }
  .sprint-label { position: absolute; left: 0; display: flex; align-items: center; pointer-events: none; z-index: 4; }
  .sprint-label-inner { font-size: 10px; font-weight: 500; color: #bbb; text-transform: uppercase; letter-spacing: 0.06em; border-left: 2px solid #ddd; padding-left: 6px; margin-left: 12px; }
  .tooltip { position: fixed; background: white; border: 0.5px solid #ddd; border-radius: 8px; padding: 8px 12px; font-size: 12px; pointer-events: none; z-index: 999; min-width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: none; }
  .tooltip-title { font-weight: 500; margin-bottom: 4px; }
  .tooltip-status { margin-bottom: 2px; }
  .tooltip-time { color: #666; }
  .tooltip-range { color: #aaa; margin-top: 2px; }
  .note { margin-top: 16px; padding: 10px 14px; border-radius: 8px; border: 0.5px solid #e0e0e0; font-size: 11px; color: #aaa; }
  #loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
  #error { text-align: center; padding: 40px; color: #e24b4a; font-size: 14px; display: none; }
</style>
</head>
<body>
<h1>Cycle Time Swimlane</h1>
<div id="loading">Loading data from Google Sheets...</div>
<div id="error"></div>
<div id="app" style="display:none"></div>
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-status" id="tt-status"></div>
  <div class="tooltip-time" id="tt-time"></div>
  <div class="tooltip-range" id="tt-range"></div>
</div>

<script>
const SHEET_ID = "1SVSGHaFx4tM7PhOT_486WuzYrRN-sVfgwfQF-xYSDNg";
const SHEET_NAME = "ClickUp Cycle Time Log";
const MIN_SEC = 10;

const WORKING_HOURS = {
  "Márcio Costa":    { start: 10, end: 19, tz: 1 },
  "Adriaan Rossouw": { start: 5.25, end: 12.5, tz: 2 },
  "default":         { start: 10, end: 19, tz: 1 },
};

const STATUS_COLORS = {
  "in progress":     { bar: "#378ADD", label: "In Progress" },
  "internal review": { bar: "#7F77DD", label: "Internal Review" },
  "ready":           { bar: "#EF9F27", label: "Ready (waiting)" },
  "complete":        { bar: "#639922", label: "Complete" },
  "blocked":         { bar: "#E24B4A", label: "Blocked" },
};

function toLocal(utcStr, assignee) {
  var tz = (WORKING_HOURS[assignee] || WORKING_HOURS["default"]).tz;
  return new Date(new Date(utcStr).getTime() + tz * 3600000);
}

function workingMs(from, to, assignee, status) {
  var w = (status === "internal review") ? { start: 10, end: 19 } : (WORKING_HOURS[assignee] || WORKING_HOURS["default"]);
  var total = 0, cur = new Date(from);
  while (cur < to) {
    var day = cur.getDay();
    if (day !== 0 && day !== 6) {
      var ws = new Date(cur); ws.setHours(Math.floor(w.start), (w.start % 1) * 60, 0, 0);
      var we = new Date(cur); we.setHours(Math.floor(w.end), (w.end % 1) * 60, 0, 0);
      var s = new Date(Math.max(cur, ws, from));
      var e = new Date(Math.min(to, we));
      if (e > s) total += e - s;
    }
    cur.setDate(cur.getDate() + 1); cur.setHours(0, 0, 0, 0);
  }
  return total;
}

function fmtMs(ms) {
  var h = Math.floor(ms / 3600000), m = Math.round((ms % 3600000) / 60000);
  return m > 0 ? h + "h " + m + "m" : h + "h";
}

function fmt(d) { return d.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" }); }
function fmtFull(d) { return d.toLocaleString("en-GB", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }); }

function parseSprintDates(sprintName) {
  var m = sprintName.match(/\((\d+)\/(\d+)\s*-\s*(\d+)\/(\d+)\)/);
  if (!m) return null;
  var year = new Date().getFullYear();
  var start = new Date(year, parseInt(m[1]) - 1, parseInt(m[2]), 0, 0, 0);
  var end   = new Date(year, parseInt(m[3]) - 1, parseInt(m[4]), 23, 59, 59);
  return { start: start, end: end };
}

function taskOverlapsSprint(task, sprintName) {
  var range = parseSprintDates(sprintName);
  if (!range) return task.sprints.indexOf(sprintName) >= 0;
  for (var i = 0; i < task.segments.length; i++) {
    var seg = task.segments[i];
    if (seg.start <= range.end && seg.end >= range.start) return true;
  }
  return false;
}

function buildTasks(events) {
  var byId = {};
  var sorted = events.slice().sort(function(a, b) { return new Date(a.ts) - new Date(b.ts); });

  for (var i = 0; i < sorted.length; i++) {
    var ev = sorted[i];
    if (!STATUS_COLORS[ev.to]) continue;
    if (ev.to === "blocked") {
      var nextBlk = null;
      for (var k = i + 1; k < sorted.length; k++) { if (sorted[k].id === ev.id) { nextBlk = sorted[k]; break; } }
      if (nextBlk && (new Date(nextBlk.ts) - new Date(ev.ts)) / 1000 < MIN_SEC) continue;
    }
    if (!byId[ev.id]) byId[ev.id] = { id: ev.id, name: ev.name, assignee: ev.assignee, pts: ev.pts, segments: [], sprints: [] };
    if (byId[ev.id].sprints.indexOf(ev.sprint) < 0) byId[ev.id].sprints.push(ev.sprint);

    var start = toLocal(ev.ts, ev.assignee);
    var nextEv = null;
    for (var j = i + 1; j < sorted.length; j++) { if (sorted[j].id === ev.id) { nextEv = sorted[j]; break; } }

    var isComplete = ev.to === "complete";
    var end = nextEv ? toLocal(nextEv.ts, ev.assignee) : (isComplete ? start : new Date());
    byId[ev.id].segments.push({ status: ev.to, start: start, end: end, isActive: !nextEv && !isComplete });
  }

  var result = [];
  for (var id in byId) { if (byId[id].segments.length > 0) result.push(byId[id]); }
  return result;
}

function buildShadeSegments(minDate, maxDate, workHours) {
  var segments = [];
  var cur = new Date(minDate); cur.setMinutes(0, 0, 0);
  while (cur < maxDate) {
    var day = cur.getDay();
    var isWeekend = day === 0 || day === 6;
    if (isWeekend) {
      var dayEnd = new Date(cur); dayEnd.setDate(dayEnd.getDate() + 1); dayEnd.setHours(0, 0, 0, 0);
      var s = new Date(Math.max(cur, minDate));
      var e = new Date(Math.min(dayEnd, maxDate));
      if (e > s) segments.push({ start: s, end: e, type: "weekend" });
      cur = dayEnd;
    } else {
      var wsH = Math.floor(workHours.start), wsM = (workHours.start % 1) * 60;
      var weH = Math.floor(workHours.end), weM = (workHours.end % 1) * 60;
      var dayStart = new Date(cur); dayStart.setHours(0, 0, 0, 0);
      var workStart = new Date(cur); workStart.setHours(wsH, wsM, 0, 0);
      var workEnd = new Date(cur); workEnd.setHours(weH, weM, 0, 0);
      var dayEnd2 = new Date(cur); dayEnd2.setDate(dayEnd2.getDate() + 1); dayEnd2.setHours(0, 0, 0, 0);
      var bs = new Date(Math.max(dayStart, minDate));
      var be = new Date(Math.min(workStart, maxDate));
      if (be > bs) segments.push({ start: bs, end: be, type: "offhours" });
      var as2 = new Date(Math.max(workEnd, minDate));
      var ae = new Date(Math.min(dayEnd2, maxDate));
      if (ae > as2) segments.push({ start: as2, end: ae, type: "offhours" });
      cur = dayEnd2;
    }
  }
  return segments;
}

function parseCSV(text) {
  var lines = text.trim().split("\n").slice(1);
  var result = [];
  for (var i = 0; i < lines.length; i++) {
    var cols = lines[i].split(",").map(function(c) { return c.replace(/^"|"$/g, "").trim(); });
    if (cols[0] && cols[5]) {
      result.push({ id: cols[0], name: cols[1], assignee: cols[2], from: cols[3], to: cols[4], ts: cols[5], sprint: cols[6], pts: parseInt(cols[7]) || 0 });
    }
  }
  return result;
}

function render(events, activeSprint, activeAssignee) {
  var allTasks = buildTasks(events);
  var sprintSet = {}, assigneeSet = {};
  allTasks.forEach(function(t) {
    t.sprints.forEach(function(s) { sprintSet[s] = true; });
    assigneeSet[t.assignee] = true;
  });
  var sprints = Object.keys(sprintSet).sort();
  var assignees = Object.keys(assigneeSet).sort();

  var tasks = allTasks.filter(function(t) {
    return (activeSprint === "All" || taskOverlapsSprint(t, activeSprint)) &&
           (activeAssignee === "All" || t.assignee === activeAssignee);
  });

  if (!tasks.length) {
    document.getElementById("app").innerHTML = "<p style='color:#aaa;padding:20px'>No tasks found for this filter.</p>";
    document.getElementById("app").style.display = "block";
    return;
  }

  var allDates = [];
  tasks.forEach(function(t) { t.segments.forEach(function(s) { allDates.push(s.start, s.end); }); });
  var minDate = new Date(Math.min.apply(null, allDates));
  var maxDate = new Date(Math.max.apply(null, allDates));
  var totalMs = maxDate - minDate;
  function pct(d) { return ((d - minDate) / totalMs) * 100; }

  var shadeHours = (activeAssignee !== "All" && WORKING_HOURS[activeAssignee]) ? WORKING_HOURS[activeAssignee] : WORKING_HOURS["default"];
  var shadeSegs = buildShadeSegments(minDate, maxDate, shadeHours);

  var dayLines = [];
  var dl = new Date(minDate); dl.setDate(dl.getDate() + 1); dl.setHours(0, 0, 0, 0);
  while (dl < maxDate) { dayLines.push(new Date(dl)); dl.setDate(dl.getDate() + 1); }

  var axisDays = [];
  var ad = new Date(minDate); ad.setHours(0, 0, 0, 0);
  while (ad <= maxDate) { if (ad.getDay() !== 0 && ad.getDay() !== 6) axisDays.push(new Date(ad)); ad.setDate(ad.getDate() + 1); }
  var step = Math.ceil(axisDays.length / 8);
  var ticks = axisDays.filter(function(_, i) { return i % step === 0; });

  var avgCycle = (function() {
    var tots = tasks.map(function(t) { return t.segments.filter(function(s) { return s.status === "in progress"; }).reduce(function(a, s) { return a + workingMs(s.start, s.end, t.assignee, "in progress"); }, 0); });
    return tots.length ? fmtMs(tots.reduce(function(a, v) { return a + v; }, 0) / tots.length) : "—";
  })();
  var avgReview = (function() {
    var tots = tasks.map(function(t) { return t.segments.filter(function(s) { return s.status === "internal review"; }).reduce(function(a, s) { return a + workingMs(s.start, s.end, t.assignee, "internal review"); }, 0); });
    return tots.length ? fmtMs(tots.reduce(function(a, v) { return a + v; }, 0) / tots.length) : "—";
  })();
  var reworkCount = tasks.filter(function(t) { return t.segments.filter(function(s) { return s.status === "in progress"; }).length >= 2; }).length;

  var sprintGroups = [];
  if (activeSprint === "All") {
    var cur2 = null, startIdx = 0;
    tasks.forEach(function(t, i) {
      var sp = t.sprints[0];
      if (sp !== cur2) { if (cur2) sprintGroups.push({ label: cur2, startIdx: startIdx, endIdx: i }); cur2 = sp; startIdx = i; }
    });
    if (cur2) sprintGroups.push({ label: cur2, startIdx: startIdx, endIdx: tasks.length });
  }

  var ROW_H = 42;
  var chartH = tasks.length * ROW_H;

  var shadeHTML = shadeSegs.map(function(s) {
    var l = pct(s.start), w = Math.max(0, pct(s.end) - pct(s.start));
    var bg = s.type === "weekend"
      ? "repeating-linear-gradient(135deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 3px,transparent 3px,transparent 8px)"
      : "repeating-linear-gradient(135deg,rgba(0,0,0,0.04) 0px,rgba(0,0,0,0.04) 3px,transparent 3px,transparent 8px)";
    return '<div style="position:absolute;left:' + l + '%;width:' + w + '%;top:0;height:' + chartH + 'px;background:' + bg + ';pointer-events:none;z-index:1"></div>';
  }).join("");

  var dayLineHTML = dayLines.map(function(d) {
    return '<div style="position:absolute;left:' + pct(d) + '%;top:0;height:' + chartH + 'px;border-left:1px solid #555;opacity:0.2;pointer-events:none;z-index:3"></div>';
  }).join("");

  var rowsHTML = tasks.map(function(task, i) {
    var barsHTML = task.segments.map(function(seg) {
      var left = pct(seg.start), width = Math.max(0.4, pct(seg.end) - pct(seg.start));
      var c = STATUS_COLORS[seg.status];
      var wm = workingMs(seg.start, seg.end, task.assignee, seg.status);
      return '<div class="bar" style="left:' + left + '%;width:' + width + '%;background:' + c.bar + '"' +
        ' data-task="' + task.name.replace(/"/g, "&quot;") + '"' +
        ' data-assignee="' + task.assignee + '"' +
        ' data-status="' + seg.status + '"' +
        ' data-active="' + seg.isActive + '"' +
        ' data-wm="' + fmtMs(wm) + '"' +
        ' data-start="' + fmtFull(seg.start) + '"' +
        ' data-end="' + fmtFull(seg.end) + '"' +
        ' onmouseenter="showTip(event)" onmousemove="moveTip(event)" onmouseleave="hideTip()"></div>';
    }).join("");
    return '<div class="row" style="background:' + (i % 2 === 0 ? "transparent" : "rgba(0,0,0,0.015)") + '">' +
      '<div class="row-label"><div class="name">' + task.name + '</div><div class="sub">' + task.assignee.split(" ")[0] + ' &middot; ' + task.pts + 'pt' + (task.pts !== 1 ? "s" : "") + '</div></div>' +
      '<div class="row-bars">' + barsHTML + '</div></div>';
  }).join("");

  var sprintLabelsHTML = sprintGroups.map(function(g) {
    return '<div class="sprint-label" style="top:' + (g.startIdx * ROW_H) + 'px;width:178px;height:' + ((g.endIdx - g.startIdx) * ROW_H) + 'px">' +
      '<div class="sprint-label-inner">' + g.label + '</div></div>';
  }).join("");

  var ticksHTML = ticks.map(function(t) {
    return '<span class="axis-label" style="left:' + pct(t) + '%">' + fmt(t) + '</span>';
  }).join("");

  var sprintOptions = sprints.slice().reverse().map(function(s) {
    return '<option value="' + s + '"' + (activeSprint === s ? " selected" : "") + '>' + s + '</option>';
  }).join("");

  var assigneeOptions = assignees.map(function(a) {
    return '<option value="' + a + '"' + (activeAssignee === a ? " selected" : "") + '>' + a + '</option>';
  }).join("");

  var app = document.getElementById("app");
  app.innerHTML =
    '<div class="filters">' +
      '<div class="filter-group"><span class="filter-label">Sprint</span>' +
        '<select class="filter-select" onchange="rerender(this.value, activeAssignee)">' +
          '<option value="All">All</option>' + sprintOptions +
        '</select></div>' +
      '<div class="filter-group"><span class="filter-label">Assignee</span>' +
        '<select class="filter-select" onchange="rerender(activeSprint, this.value)">' +
          '<option value="All">All</option>' + assigneeOptions +
        '</select></div>' +
    '</div>' +
    '<div class="cards">' +
      '<div class="card"><div class="card-label">Avg cycle time</div><div class="card-value">' + avgCycle + '</div><div class="card-sub">working hrs in progress</div></div>' +
      '<div class="card"><div class="card-label">Avg review time</div><div class="card-value">' + avgReview + '</div><div class="card-sub">working hrs in review</div></div>' +
      '<div class="card"><div class="card-label">Tasks with rework</div><div class="card-value">' + reworkCount + ' / ' + tasks.length + '</div><div class="card-sub">≥2 in progress cycles</div></div>' +
    '</div>' +
    '<div class="legend">' +
      Object.entries(STATUS_COLORS).map(function(e) {
        return '<div class="legend-item"><div class="legend-dot" style="background:' + e[1].bar + '"></div>' + e[1].label + '</div>';
      }).join("") +
      '<div class="legend-item"><div class="legend-dot" style="background:repeating-linear-gradient(135deg,rgba(0,0,0,0.1) 0px,rgba(0,0,0,0.1) 3px,transparent 3px,transparent 8px);border:0.5px solid #ddd"></div>Off hours / weekend</div>' +
    '</div>' +
    '<div class="chart-wrap"><div class="chart" style="position:relative">' +
      '<div style="position:absolute;left:190px;right:0;top:0;height:' + chartH + 'px;overflow:hidden">' + shadeHTML + dayLineHTML + '</div>' +
      rowsHTML + sprintLabelsHTML +
      '<div class="axis"><div class="axis-spacer"></div><div class="axis-labels">' + ticksHTML + '</div></div>' +
    '</div></div>' +
    '<div class="note">Timestamps converted to local time per assignee (Márcio UTC+1 · Adriaan UTC+2). Shading reflects off-hours for ' + (activeAssignee === "All" ? "default schedule (10h–19h)" : activeAssignee) + '. Blocked transitions &lt;10s filtered out.</div>';

  app.style.display = "block";
}

function showTip(e) {
  var t = document.getElementById("tooltip"), b = e.target;
  document.getElementById("tt-title").textContent = b.dataset.task;
  document.getElementById("tt-status").textContent = STATUS_COLORS[b.dataset.status].label;
  document.getElementById("tt-status").style.color = STATUS_COLORS[b.dataset.status].bar;
  document.getElementById("tt-time").textContent = "Working time: " + b.dataset.wm + (b.dataset.active === "true" ? " (ongoing)" : "");
  document.getElementById("tt-range").textContent = b.dataset.start + " → " + b.dataset.end;
  t.style.display = "block"; moveTip(e);
}
function moveTip(e) {
  var t = document.getElementById("tooltip");
  t.style.top = (e.clientY - 110) + "px";
  t.style.left = (e.clientX + 12) + "px";
}
function hideTip() { document.getElementById("tooltip").style.display = "none"; }

var allEvents = [], activeSprint = "All", activeAssignee = "All";
function rerender(sprint, assignee) {
  activeSprint = sprint; activeAssignee = assignee;
  render(allEvents, activeSprint, activeAssignee);
}

async function load() {
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(SHEET_NAME);
  try {
    var res = await fetch(url);
    if (!res.ok) throw new Error("Failed to fetch");
    var text = await res.text();
    allEvents = parseCSV(text);
    document.getElementById("loading").style.display = "none";
    render(allEvents, "All", "All");
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("error").textContent = "Could not load data. Make sure the Google Sheet is shared publicly (Anyone with link → Viewer).";
  }
}
load();
</script>
</body>
</html>
